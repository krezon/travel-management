apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-management
  labels:
    app: travel-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: travel-management
  template:
    metadata:
      labels:
        app: travel-management
    spec:
      containers:
        - name: travel-management
          image: dereselim/travel-management:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
